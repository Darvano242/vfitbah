<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>VFITNESS Coach Tools | Assign Plans</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{background:#05070b;color:#fff;min-height:100vh;padding:20px 14px 60px}
.wrap{max-width:560px;margin:0 auto}
h1{font-size:24px;font-weight:900;letter-spacing:-.02em;margin:14px 0 4px}
.sub{color:#8b93a7;font-size:13px;margin-bottom:20px;line-height:1.6}
.card{background:#0b0f16;border:1px solid rgba(125,165,255,.22);border-radius:18px;padding:16px;margin-bottom:12px}
.card h2{font-size:16px;font-weight:800;margin-bottom:2px}
.tag{display:inline-block;font-size:10px;font-weight:900;letter-spacing:.08em;color:#5eead4;background:rgba(45,212,191,.1);border:1px solid rgba(45,212,191,.35);border-radius:999px;padding:3px 9px;margin-bottom:8px}
.who{color:#8b93a7;font-size:12px;margin-bottom:10px}
button{cursor:pointer;border:0;border-radius:12px;font-weight:800;font-size:14px;padding:12px 16px;color:#fff}
.go{width:100%;background:linear-gradient(120deg,#3d7dff,#6f5bff);box-shadow:0 14px 34px -14px rgba(61,125,255,.7)}
.go:disabled{opacity:.45}
.pick{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.16);width:100%;text-align:left;margin-bottom:8px;font-weight:600}
.pick.on{border-color:rgba(61,125,255,.8);background:rgba(61,125,255,.16)}
input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.16);border-radius:12px;padding:12px 14px;color:#fff;font-size:15px;margin-bottom:10px}
.log{font-size:12.5px;line-height:1.7;margin-top:8px;white-space:pre-wrap}
.ok{color:#4ade80}.bad{color:#f87171}.dim{color:#8b93a7}
.exs{font-size:12px;color:#8b93a7;line-height:1.7;margin:8px 0 12px}
</style>
</head>
<body>
<div class="wrap">
<h1>Assign Workout Plans</h1>
<div class="sub">Coach tool. Signs in with your VFITNESS admin account, finds the client, and delivers the plan to their dashboard through both delivery paths.</div>
<div id="authCard" class="card" style="display:none">
<h2>Coach Sign In</h2>
<div class="who">Use your VFITNESS admin or trainer login.</div>
<input id="em" type="email" placeholder="Email" autocomplete="username">
<input id="pw" type="password" placeholder="Password" autocomplete="current-password">
<button class="go" onclick="signIn()">Sign In</button>
<div id="authLog" class="log"></div>
</div>
<div id="main" style="display:none"></div>
<div id="boot" class="log dim">Connecting...</div>
</div>
<script>
const vfD=a=>a.map(c=>String.fromCharCode(c)).join('');
firebase.initializeApp({
 apiKey:vfD([65,73,122,97,83,121,65,99,103,85,121,74,48,115,55,67,120,120,100,74,101,117,119,48,71,73,49,89,109,57,104,105,67,106,111,104,57,101,52]),
 authDomain:vfD([118,102,105,116,110,101,115,115,45,98,98,100,98,52,46,102,105,114,101,98,97,115,101,97,112,112,46,99,111,109]),
 projectId:vfD([118,102,105,116,110,101,115,115,45,98,98,100,98,52]),
 storageBucket:vfD([118,102,105,116,110,101,115,115,45,98,98,100,98,52,46,102,105,114,101,98,97,115,101,115,116,111,114,97,103,101,46,97,112,112]),
 messagingSenderId:vfD([52,50,55,49,52,52,55,52,49,57,52,54]),
 appId:vfD([49,58,52,50,55,49,52,52,55,52,49,57,52,54,58,119,101,98,58,54,53,100,50,53,102,52,54,48,55,99,56,54,57,54,51,50,48,50,49,48,51])
});
const auth=firebase.auth();
const db=firebase.firestore();
const FV=firebase.firestore.FieldValue;
const TS=firebase.firestore.Timestamp;

const LEG_DAY={programName:'Full Leg Day',exercises:[
 x('Barbell Back Squat','Legs',4,8,120,'https://www.youtube.com/watch?v=eMYjBnIVb_A','Brace hard, sit between your hips, drive the floor away. Depth over weight.'),
 x('Leg Press','Legs',4,10,90,'https://www.youtube.com/watch?v=IZxyjW7MPJQ','Feet shoulder width, lower under control, never lock the knees hard at the top.'),
 x('Romanian Deadlift','Legs',4,10,90,'https://www.youtube.com/watch?v=5bJEigM5iVg','Soft knees, push the hips back, feel the hamstrings load, flat back the whole way.'),
 x('Walking Lunges','Legs',3,12,60,'https://www.youtube.com/watch?v=WzONHuAe6BY','Long steps, front knee tracks over the toes, stay tall. 12 steps each leg.'),
 x('Lying Leg Curl','Legs',3,12,60,'','Squeeze the hamstrings at the top, lower slow for 3 seconds.'),
 x('Standing Calf Raise','Legs',4,15,45,'https://www.youtube.com/watch?v=YMmgqO8Jo-k','Full stretch at the bottom, pause one second at the top.')]};
const PUSH_DAY={programName:'Full Push Day',exercises:[
 x('Barbell Bench Press','Chest',4,8,120,'https://www.youtube.com/watch?v=4Y2ZdHCOXok','Shoulder blades pinned, bar to mid chest, press up and slightly back.'),
 x('Incline Dumbbell Press','Chest',4,10,90,'https://www.youtube.com/watch?v=5Y3VZsLb1Ys','30 degree bench, elbows at 45, full range without bouncing at the bottom.'),
 x('Seated Dumbbell Shoulder Press','Shoulders',4,10,90,'https://www.youtube.com/watch?v=qEwKCR5JCog','Core tight, press to full lockout, control the way down.'),
 x('Lateral Raises','Shoulders',3,15,60,'https://www.youtube.com/watch?v=IVbr0Gvd6aA','Lead with the elbows, raise to shoulder height, no swinging.'),
 x('Tricep Pushdown','Arms',3,12,60,'https://www.youtube.com/watch?v=tj81tVq3wLo','Elbows locked to your sides, full extension, squeeze at the bottom.'),
 x('Push Ups','Chest',3,15,60,'https://www.youtube.com/watch?v=mECzqUIDWfU','Finisher. Body in one line, chest to the floor. Go to solid form failure.')]};
function x(name,mg,sets,reps,rest,videoUrl,instructions){return{exerciseId:'',exerciseName:name,name:name,muscleGroup:mg,sets:sets,reps:reps,rest:rest,weight:0,videoUrl:videoUrl,instructions:instructions};}
const TARGETS=[
 {search:'christina almonor',label:'Christina Almonor',plan:LEG_DAY},
 {search:'pedro',label:'Pedro',plan:PUSH_DAY},
 {search:'taivon',label:'Taivon',plan:PUSH_DAY}];
let clients=[];const chosen={};

auth.onAuthStateChanged(async u=>{
 const boot=document.getElementById('boot');
 if(!u){boot.style.display='none';document.getElementById('authCard').style.display='block';return;}
 boot.textContent='Checking access...';
 try{
  const me=await db.collection('users').doc(u.uid).get();
  const role=me.exists?(me.data().role||''):'';
  if(role!=='admin'&&role!=='trainer'){boot.innerHTML='<span class=bad>This account ('+(u.email||'')+') is not an admin or trainer. Sign in with your coach account.</span> <button class=pick style=margin-top:10px onclick="auth.signOut()">Switch Account</button>';return;}
  boot.textContent='Loading clients...';
  const snap=await db.collection('users').get();
  clients=snap.docs.map(d=>({id:d.id,...d.data()})).filter(cl=>(cl.role||'client')==='client');
  boot.style.display='none';document.getElementById('authCard').style.display='none';
  render();
 }catch(e){boot.innerHTML='<span class=bad>Could not load: '+(e.code||e.message)+'</span>';}
});
async function signIn(){
 const el=document.getElementById('authLog');el.textContent='Signing in...';
 try{await auth.signInWithEmailAndPassword(document.getElementById('em').value.trim(),document.getElementById('pw').value);el.textContent='';}
 catch(e){el.innerHTML='<span class=bad>'+(e.code||e.message)+'</span>';}
}
function matchesFor(t){
 const q=t.search.toLowerCase();
 let m=clients.filter(cl=>((cl.name||'')+' '+(cl.email||'')).toLowerCase().includes(q));
 if(m.length===0&&q.includes(' ')){const first=q.split(' ')[0];m=clients.filter(cl=>((cl.name||'')+' '+(cl.email||'')).toLowerCase().includes(first));}
 return m;
}
function render(){
 const main=document.getElementById('main');main.style.display='block';
 main.innerHTML=TARGETS.map((t,ti)=>{
  const m=matchesFor(t);
  let inner='';
  if(m.length===0){inner='<div class="log bad">No client found matching "'+t.label+'". Check the name in your client list, then reload this page.</div>';}
  else{
   if(!(ti in chosen))chosen[ti]=m[0].id;
   inner=m.map(cl=>'<button class="pick '+(chosen[ti]===cl.id?'on':'')+'" onclick="chosen['+ti+']=\''+cl.id+'\';render()">'+(cl.name||'No name')+' <span class=dim>'+(cl.email||'')+'</span></button>').join('');
   inner+='<div class="exs">'+t.plan.exercises.map(e=>e.name+' '+e.sets+'x'+e.reps).join(' · ')+'</div>';
   inner+='<button class="go" id="go'+ti+'" onclick="assign('+ti+')">Assign '+t.plan.programName+'</button>';
  }
  return '<div class="card"><span class="tag">'+t.plan.programName.toUpperCase()+'</span><h2>'+t.label+'</h2><div class="who">Pick the right account if more than one shows.</div>'+inner+'<div class="log" id="log'+ti+'"></div></div>';
 }).join('')+'<button class="go" style="margin-top:6px" onclick="assignAll()">Assign All Three</button><div class="log dim" style="margin-top:10px">Safe to tap more than once. Already assigned plans are skipped, not duplicated.</div>';
}
async function assign(ti){
 const t=TARGETS[ti];const cid=chosen[ti];const log=document.getElementById('log'+ti);const btn=document.getElementById('go'+ti);
 if(!cid){log.innerHTML='<span class=bad>Pick a client first.</span>';return;}
 const cl=clients.find(c=>c.id===cid);btn.disabled=true;log.innerHTML='<span class=dim>Assigning...</span>';
 try{
  let already=false;
  try{const ex=await db.collection('workoutPrograms').where('clientId','==',cid).get();
   already=ex.docs.some(d=>{const p=d.data();return p.programName===t.plan.programName&&(p.status||'active')==='active';});}catch(qE){}
  if(!already){try{const arr=(cl.assignedWorkoutPrograms||[]);already=arr.some(p=>p.programName===t.plan.programName&&(p.status||'active')==='active');}catch(aE){}}
  if(already){log.innerHTML='<span class=ok>Already on '+(cl.name||'client')+"'s dashboard. Skipped, no duplicate.</span>";btn.disabled=false;return;}
  const me=auth.currentUser;
  const ref=await db.collection('workoutPrograms').add({clientId:cid,clientName:cl.name||cl.email||'Client',trainerId:me.uid,trainerName:me.displayName||'Coach D',programName:t.plan.programName,exercises:t.plan.exercises,status:'active',createdAt:FV.serverTimestamp()});
  await db.collection('users').doc(cid).set({assignedWorkoutPrograms:FV.arrayUnion({id:ref.id,programName:t.plan.programName,exercises:t.plan.exercises,trainerName:me.displayName||'Coach D',status:'active',assignedAt:TS.now()}),lastWorkoutAssignmentAt:FV.serverTimestamp()},{merge:true});
  log.innerHTML='<span class=ok>Done. '+t.plan.programName+' is live on '+(cl.name||'the client')+"'s dashboard under Workouts.</span>";
 }catch(e){log.innerHTML='<span class=bad>Failed: '+(e.code||e.message)+'</span>';}
 btn.disabled=false;
}
async function assignAll(){for(let i=0;i<TARGETS.length;i++){if(chosen[i])await assign(i);}}
</script>
</body>
</html>
