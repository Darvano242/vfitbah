name: Apply VFitness Scale Upgrade

on:
  workflow_dispatch:
  pull_request_target:
    types: [opened]
    paths:
      - '.github/vfitness-upgrade-trigger.txt'

permissions:
  contents: write

jobs:
  apply-upgrade:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout production branch
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download tested upgrade assets
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location \
            https://vfitnessba242.netlify.app/vfit_scale_upgrade.css \
            --output site/vfit_scale_upgrade.css
          curl --fail --silent --show-error --location \
            https://vfitnessba242.netlify.app/vfit_scale_upgrade.js \
            --output site/vfit_scale_upgrade.js
          test -s site/vfit_scale_upgrade.css
          test -s site/vfit_scale_upgrade.js
          grep -q 'Pricing correction' site/vfit_scale_upgrade.css
          grep -q '749.70' site/vfit_scale_upgrade.js
          grep -q '497.25' site/vfit_scale_upgrade.js
          grep -q "'153'" site/vfit_scale_upgrade.js

      - name: Inject upgrade into production app
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          index_path = Path('site/index.html')
          html = index_path.read_text(encoding='utf-8')
          css_tag = '    <link rel="stylesheet" href="/vfit_scale_upgrade.css?v=20260716b">\n'
          js_tag = '    <script src="/vfit_scale_upgrade.js?v=20260716b"></script>\n'

          if '/vfit_scale_upgrade.css' not in html:
              html = html.replace('</head>', css_tag + '</head>', 1)
          if '/vfit_scale_upgrade.js' not in html:
              html = html.replace('</body>', js_tag + '</body>', 1)
          index_path.write_text(html, encoding='utf-8')

          sw_path = Path('site/sw.js')
          sw = sw_path.read_text(encoding='utf-8')
          sw = re.sub(r"const CACHE_NAME='[^']+';", "const CACHE_NAME='vfitness-shell-v20260716b';", sw, count=1)
          sw_path.write_text(sw, encoding='utf-8')
          PY

      - name: Validate production files
        run: |
          set -euo pipefail
          grep -q '/vfit_scale_upgrade.css?v=20260716b' site/index.html
          grep -q '/vfit_scale_upgrade.js?v=20260716b' site/index.html
          grep -q 'vfitness-shell-v20260716b' site/sw.js
          node --check site/vfit_scale_upgrade.js
          test "$(wc -c < site/vfit_scale_upgrade.css)" -gt 20000
          test "$(wc -c < site/vfit_scale_upgrade.js)" -gt 40000

      - name: Commit production upgrade
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add site/index.html site/sw.js site/vfit_scale_upgrade.css site/vfit_scale_upgrade.js
          if git diff --cached --quiet; then
            echo 'Upgrade already applied.'
            exit 0
          fi
          git commit -m 'Apply VFitness scale funnel and corrected pricing'
          git push origin HEAD:main
